<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Karetní hra</title>

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<h1>Karetní hra</h1>

<!-- ✅ NÁVOD -->
<button onclick="toggleNavod()">Návod</button>

<div id="navod" style="display:none;">
  <p>
    Přetahuj karty do sloupců podle výsledku.<br>
    Každý sloupec musí obsahovat 4 karty se stejným výsledkem.
  </p>
</div>

<!-- ✅ OBTÍŽNOST -->
<div>
  <button onclick="nastavObtiznost(20)">Do 20</button>
  <button onclick="nastavObtiznost(100)">Do 100</button>
  <button onclick="nastavObtiznost(1000)">Do 1000</button>
</div>

<!-- ✅ REŽIM -->
<div>
  <button onclick="nastavRezim('plusminus')">+ −</button>
  <button onclick="nastavRezim('nasobeni')">× ÷</button>
</div>

<!-- ✅ TLAČÍTKA -->
<div id="tlacitka">
  <button onclick="lizniKartu()">Lízni kartu</button>
  <button onclick="zkontroluj()">Zkontroluj</button>
  <button onclick="novaHra()">Nová hra</button>
</div>

<!-- ✅ KARTA -->
<div id="aktualni-karta"></div>

<!-- ✅ SLOUPCE -->
<div id="sloupce">
  <div class="sloupec"></div>
  <div class="sloupec"></div>
  <div class="sloupec"></div>
  <div class="sloupec"></div>
  <div class="sloupec"></div>
</div>

</body>
</html>
