<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Matematický Solitaire</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

  <h1>Matematický Solitaire</h1>
<div style="margin: 20px;">

<b>Vyber téma:</b><br><br>

<button onclick="nastavTyp('plus')">➕ Sčítání</button>
<button onclick="nastavTyp('minus')">➖ Odčítání</button>
<button onclick="nastavTyp('nasobeni')">✖️ Násobení</button>
<button onclick="nastavTyp('mix')">🔀 Mix</button>

</div>
<button onclick="toggleNavod()">📖 Zobrazit návod</button>

<div id="navod" style="
  display: none;
  background: white;
  color: black;
  padding: 15px;
  margin: 20px auto;
  width: 50%;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
">

<b>🎮 Jak hrát:</b><br><br>

✅ Klikni na <b>Lízni kartu</b><br>
✅ Přetáhni kartu do sloupce<br>
✅ Do jednoho sloupce patří příklady se stejným výsledkem<br>
✅ Karty můžeš přesouvat mezi sloupci<br>
✅ Klikni na <b>Zkontrolovat</b><br>
✅ <b>Nová hra</b> začne znovu

</div>


  <div id="sloupce">
    <div class="sloupec"></div>
    <div class="sloupec"></div>
    <div class="sloupec"></div>
    <div class="sloupec"></div>
    <div class="sloupec"></div>
  </div>

  <button onclick="lizniKartu()">Lízni kartu</button>
<br><br>
<button onclick="zkontroluj()">Zkontrolovat</button>
  <br><br>
<button onclick="novaHra()">Nová hra</button>
  <div id="aktualni-karta"></div>

  <script src="script.js"></script>

</body>
</html>
