<!DOCTYPE html>
<html><html lang="cs">
  <meta charset="UTF-8">
  <title>Karetní hra</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- JS (důležité: defer!) -->
  <script src="script.js" defer></script>
</head>

<body>

<h1>Karetní hra</h1>

<!-- ✅ obtížnost -->
<div>
  Do 10:
  <button onclick="nastavObtiznost(10)">10</button>
  <button onclick="nastavObtiznost(20)">20</button>
  <button onclick="nastavObtiznost(100)">100</button>
</div>

<!-- ✅ režim -->
<div>
  <button onclick="nastavRezim('plusminus')">+ −</button>
  <button onclick="nastavRezim('nasobeni')">× ÷</button>
</div>

<!-- ✅ ovládání -->
<div id="tlacitka">
  <button onclick="lizniKartu()">Lízni kartu</button>
  <button onclick="zkontroluj()">Zkontroluj</button>
  <button onclick="novaHra()">Nová hra</button>
</div>

<!-- ✅ líznutá karta -->
<div id="aktualni-karta"></div>

<!-- ✅ TOHLE JSOU TY SLoupce !! -->
<div id="sloupce">
  <div class="sloupec"></div>
  <div class="sloupec"></div>
  <div class="sloupec"></div>
  <div class="sloupec"></div>
  <div class="sloupec"></div>
</div>

</body>
</html>
