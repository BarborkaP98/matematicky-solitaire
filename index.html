<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Matematický Solitaire</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

  <h1>Matematický Solitaire</h1>

<p>
🎮 Návod:<br>
1. Klikni na "Lízni kartu".<br>
2. Přetáhni kartu do libovolného sloupce.<br>
3. Do jednoho sloupce patří příklady se stejným výsledkem.<br>
4. Karty můžeš přesouvat mezi sloupci.<br>
5. Na konci klikni na "Zkontrolovat".<br>
6. Tlačítkem "Nová hra" začneš znovu.
</p>

  <div id="sloupce">
    <div class="sloupec"></div>
    <div class="sloupec"></div>
    <div class="sloupec"></div>
    <div class="sloupec"></div>
    <div class="sloupec"></div>
  </div>

  <button onclick="lizniKartu()">Lízni kartu</button>
<br><br>
<button onclick="zkontroluj()">Zkontrolovat</button>
  <br><br>
<button onclick="novaHra()">Nová hra</button>
  <div id="aktualni-karta"></div>

  <script src="script.js"></script>

</body>
</html>
